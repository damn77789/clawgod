name: Feature Request
description: Suggest a new patch or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      placeholder: Describe the feature or patch you'd like to see.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Why?
      placeholder: What problem does this solve? What's your use case?
